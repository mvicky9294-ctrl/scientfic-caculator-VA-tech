<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator V.A Tech</title>
    <meta name="description" content="Use the sleek VA Tech Scientific Calculator online. Calculate advanced trigonometry, logs, and equations quickly.">
<meta name="keywords" content="VA Tech, scientific calculator, online calculator, web calculator, V.A Tech">
<meta name="author" content="Vignesh.M">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <!-- Brand Signature -->
        <div class="brand">V.A TECH</div>
        
        <!-- Large Dual Display Screen -->
        <div class="display-box">
            <div id="expression-display"></div>
            <div id="live-preview">0</div>
        </div>

        <!-- Calculator Buttons -->
        <div class="buttons-grid">
            <!-- Row 1: Scientific Functions -->
            <button class="btn sci" onclick="press('sin(')">sin</button>
            <button class="btn sci" onclick="press('cos(')">cos</button>
            <button class="btn sci" onclick="press('tan(')">tan</button>
            <button class="btn sci" onclick="press('Math.sqrt(')">√</button>
            
            <!-- Row 2: Advanced Math -->
            <button class="btn sci" onclick="press('Math.PI')">π</button>
            <button class="btn sci" onclick="press('Math.log10(')">log</button>
            <button class="btn sci" onclick="press('**2')">x²</button>
            <button class="btn clear" onclick="clearDisplay()">C</button>

            <!-- Row 3: White Numbers & Basic Operators -->
            <button class="btn" onclick="press('7')">7</button>
            <button class="btn" onclick="press('8')">8</button>
            <button class="btn" onclick="press('9')">9</button>
            <button class="btn operator" onclick="press('/')">÷</button>

            <!-- Row 4 -->
            <button class="btn" onclick="press('4')">4</button>
            <button class="btn" onclick="press('5')">5</button>
            <button class="btn" onclick="press('6')">6</button>
            <button class="btn operator" onclick="press('*')">×</button>

            <!-- Row 5 -->
            <button class="btn" onclick="press('1')">1</button>
            <button class="btn" onclick="press('2')">2</button>
            <button class="btn" onclick="press('3')">3</button>
            <button class="btn operator" onclick="press('-')">−</button>

            <!-- Row 6 -->
            <button class="btn" onclick="press('0')">0</button>
            <button class="btn" onclick="press('.')">.</button>
            <button class="btn equal" onclick="calculate()">=</button>
            <button class="btn operator" onclick="press('+')">+</button>
            
            <!-- Helper closing parenthesis row for scientific formulas -->
            <button class="btn sci" style="grid-column: span 4; height: 40px; font-size: 14px;" onclick="press(')')">close parenthesis ( ) )</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
